# ── SIM vs REAL MODE TOGGLE ──────────────────────────────────────────────────
# "sim"  = aggressive learning, full Kelly, no loss caps, auto-apply mutations
# "real" = capital preservation ONLY – every conservative cap enforced
mode: "sim"

# ── TELEGRAM (enige UI voor Steve) ───────────────────────────────────────────
# Set via environment variables or fill in directly (NEVER commit real tokens).
# ApprovalGymScheduler + shadow gate + veto flow all use this single section.
# Notifications are ONLY sent during Brussels waking hours (08:00–22:00 CET).
telegram:
  token: "${TELEGRAM_BOT_TOKEN}"    # Bot token from @BotFather
  chat_id: "${TELEGRAM_CHAT_ID}"    # Steve's personal chat ID (alleen Steve)
  waking_hour_start: 8              # Brussels CET start (inclusive)
  waking_hour_end: 22               # Brussels CET end (exclusive)

# ── TRADER IDENTITY ──────────────────────────────────────────────────────────
# Overridden by env vars LUMINA_TRADER_NAME or TRADERLEAGUE_PARTICIPANT_HANDLE
participant_id: "LUMINA_Steve"

sim:
  aggressive_evolution: true         # SelfEvolutionMetaAgent auto-applies without human approval
  approval_required: false           # Mutations applied immediately
  daily_loss_cap: null               # Unlimited P/L (learning, not capital)
  kelly_fraction: 1.0                # Full Kelly – maximise exploration velocity
  bible_base_winrate: 0.55           # Realistic baseline; evolution can push higher
  max_mutation_depth: "radical"      # Allow add/remove indicators, confluence rewrites, prompt rewrites

real:
  aggressive_evolution: false        # Conservative mutations only
  approval_required: true            # Human must approve every change
  daily_loss_cap: -150.0             # Ultra-conservative cap (USD)
  max_consecutive_losses: 1
  max_open_risk_per_instrument: 75.0
  max_total_open_risk: 150.0
  max_exposure_per_regime: 100.0
  cooldown_after_streak: 60
  session_cooldown_minutes: 60
  enforce_session_guard: true
  kelly_fraction: 0.25               # Fractional Kelly – safety cap
  bible_base_winrate: 0.55           # Conservative baseline
  max_mutation_depth: "conservative" # Minor parameter tweaks only

# ─────────────────────────────────────────────────────────────────────────────
hardware_profile: "light"          # Verander later naar "sweet" of "beast"
reconcile_fills: true
reconciliation_method: "websocket"
reconciliation_timeout_seconds: 15
use_real_fill_for_pnl: true

broker:
  backend: paper
  crosstrade:
    api_key: "${CROSSTRADE_TOKEN}"
    websocket_url: "wss://app.crosstrade.io/ws/stream"

xai:
  api_key: "${XAI_API_KEY}"
  model: "grok-4.1-fast"
  update_interval_sec: 60

inference:
  primary_provider: "ollama"       # "ollama" | "vllm" | "grok_remote"
  provider_order: ["vllm", "ollama", "grok_remote"]
  max_tokens: 1200
  temperature: 0.65
  json_mode: true
  fast_path_threshold: 0.75

vllm:
  host: "http://localhost:8000"
  model_name: "qwen3.5-35b"

ollama:
  base_url: "http://localhost:11434"
  temperature: 0.65                # Menselijk gevoel + lichte creativiteit
  context_length: 16384
  num_gpu: -1                      # Volledige GPU
  num_ctx: 16384

models:
  vision: "qwen2.5-vl:7b"
  reasoning: "qwen3.5:4b"
  reflector: "qwen2.5:3b"
  meta: "qwen3.5:9b"               # Zwaardere lokale reasoning voor sweet-profiel
  grok_trader_1b: "qwen3.5-35b"    # High-end provider mapping via vLLM

trading:
  instrument: "MES JUN26"
  risk_profile: "Balanced"
  
  # NEWS AVOIDANCE - v51 Capital Preservation
  # Pre-event buffer (default minutes before economic event)
  news_avoidance_pre_minutes: 10
  # Post-event buffer (default minutes after economic event)
  news_avoidance_post_minutes: 5
  # High-impact events (Federal Reserve, etc.) extend these windows
  news_avoidance_high_impact_pre_minutes: 15
  news_avoidance_high_impact_post_minutes: 10
  
  # Kept for compatibility with older configs; prefer news_avoidance_pre_minutes / news_avoidance_post_minutes
  news_avoidance_minutes: 3
  
  news_impact_multipliers:
    high_bullish: 1.8
    high_bearish: 0.4
    medium_neutral: 1.0
  
  # EOD MANAGEMENT - v51 Capital Preservation
  # Force-close all positions N minutes before session end
  eod_force_close_minutes_before_session_end: 30
  # Stop opening new trades N minutes before session end
  eod_no_new_trades_minutes_before_session_end: 60
  # Protect against overnight gap risk
  overnight_gap_protection_enabled: true
  
  # KELLY POSITION SIZING - v51 Capital Preservation
  # Maximum Kelly fraction (25% = fractional Kelly for safety)
  kelly_fraction_max: 0.25
  # Only apply Kelly when confidence >= this threshold
  kelly_min_confidence: 0.65

risk_controller:
  # Hard Risk Controller - Unbreakable Safety Layer (fail-closed)
  # Sensible defaults; adjust based on instrument volatility & account size
  
  # Maximum daily loss before hard kill-switch engages (USD)
  # Negative value: -1000 means stop trading if daily loss reaches -$1000
  daily_loss_cap: -1000.0
  
  # Maximum consecutive losing trades before cooldown period
  # After N consecutive losses, trading pauses for cooldown_after_streak minutes
  max_consecutive_losses: 3
  
  # Maximum risk per individual instrument (USD)
  # Prevents overexposure to single symbol (e.g., MES, NQ, YM)
  max_open_risk_per_instrument: 500.0

  # Maximum aggregate open risk across all instruments (USD)
  max_total_open_risk: 3000.0
  
  # Maximum total exposure per market regime (USD)
  # Protects against correlated losses across all instruments in same regime
  # E.g., if trending_up regime has MES + NQ, cap combined risk
  max_exposure_per_regime: 2000.0
  
  # Cooldown period after loss streak (minutes)
  # After max_consecutive_losses is reached, wait this long before resuming
  cooldown_after_streak: 30

  # LIVING ORGANISM v51 - RL execution costs (SIM fast, REAL realistic)
  slippage_base_points: 0.125
  slippage_sigma: 0.5
  slippage_volatility_factor: 1.0
  commission_per_side_usd: 1.29
  exchange_fee_per_side_usd: 0.35
  clearing_fee_per_side_usd: 0.10
  nfa_fee_per_side_usd: 0.02

  # LIVING ORGANISM v51 - REAL fail-closed capital floor
  real_capital_safety_threshold_usd: 1000.0
  real_capital_safety_threshold_ratio: 0.90

  # LIVING ORGANISM v51 - VaR/ES risk envelope
  var_es_method: "historical"               # historical | parametric
  var_es_window: 200
  var_es_min_samples: 40
  var_es_fail_closed_on_insufficient_data: true
  var_es_insufficient_data_policy: "fail_closed_real_only"  # advisory | fail_closed_real_only | fail_closed_all_enforced
  enable_var_es_calc: true
  enable_var_es_enforce_sim_real_guard: true
  enable_var_es_enforce_real: true
  var_es_high_risk_limit_multiplier: 0.80
  var_es_normal_risk_limit_multiplier: 1.00
  var_es_reason_codes_enabled: true
  var_95_limit_usd: 1200.0
  var_99_limit_usd: 1800.0
  es_95_limit_usd: 1500.0
  es_99_limit_usd: 2200.0

  # LIVING ORGANISM v52 - Regime-aware Monte-Carlo projected max drawdown
  enable_mc_drawdown_calc: true
  mc_drawdown_paths: 10000
  mc_drawdown_horizon_days: 252
  mc_drawdown_min_samples: 40
  mc_drawdown_insufficient_data_policy: "fail_closed_real_only"  # advisory | fail_closed_real_only | fail_closed_all_enforced
  enable_mc_drawdown_enforce_sim_real_guard: true
  enable_mc_drawdown_enforce_real: true
  mc_drawdown_threshold_pct: 12.0
  mc_drawdown_random_seed: 4242

  # LIVING ORGANISM v51 - SIM reward shaping against tail risk
  sim_var_penalty_coeff: 0.04
  sim_es_penalty_coeff: 0.06
  
  # Enable risk controller (set to false only for testing)
  enabled: true

security:
  # CORS Configuration: Strict allowlist (NO wildcard "*")
  # Specify only trusted domains that need to access the API
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8000"
  
  # JWT Configuration
  jwt_secret_key: "${LUMINA_JWT_SECRET_KEY}"  # Required: provide via environment variable
  jwt_algorithm: "HS256"
  jwt_expiration_minutes: 1440                # 24 hours
  
  # API Key Configuration
  api_key_header: "X-API-Key"
  # Define active keys here via secure provisioning (no placeholders in runtime config).
  # Generate: python -c "import secrets; print(f'sk_{secrets.token_hex(32)}')"
  api_keys: {}
  
  # Rate Limiting (token bucket algorithm)
  rate_limit_enabled: true
  rate_limit_requests_per_minute: 60        # 60 req/min = 1 req/sec average
  rate_limit_burst_size: 10                  # Allow up to 10 concurrent requests
  
  # Admin Role Requirements
  admin_role_required: true                  # Require admin role for destructive endpoints
  
  # Security Audit Logging
  audit_log_enabled: true
  audit_log_path: "logs/security_audit.jsonl"  # Append-only audit trail
  
  # Dangerous Config Validation
  # At startup, fail if these config values are detected (fail-closed mode)
  dangerous_configs:
    "cors_allowed_origins": ["*"]            # CORS wildcard is forbidden
    "security.debug_mode": [true]            # Debug mode must be explicit false

evolution:
  enabled: true
  approval_required: true
  meta_swarm:
    enabled: true          # five-agent council gates DNA promotion inside EvolutionOrchestrator
  # Fase 3: OHLC-pad (DNA); override: LUMINA_OHLC_DNA_STRESS of state/bot_stress_choices.json
  ohlc_reality_stress_enabled: true
  community_knowledge:
    enabled: true
    max_commit_per_generation: 3
    queue_path: "state/community_knowledge_queue.jsonl"
    processed_path: "state/community_knowledge_processed.txt"
    twin_confidence_min: 0.82   # twin bar for external snippets (below REAL zero-touch 0.97)
  dream_engine:
    enabled: true           # fast what-if paths before nightly mutations
    dream_count: 4000      # 200–50k micro-sims per generation
    horizon_days: 7        # forward days per dream (capped by sim_days)
    drawdown_limit_ratio: 0.02
    commit_hints_to_bible: true   # append dream rule_hints to lumina_bible (tail suggestions)
    # Tighten DNA hyperparam_suggestion (max_risk / drawdown_kill) from dream hints; bounded. Not applied in real unless listed under risk_nudge_modes.
    apply_risk_nudges: true
    risk_nudge_modes: [sim, paper]
  shadow_validation:
    min_days: 3
    max_days: 7
  multiweek_fitness:
    enabled: false          # set true to use multi-week SIM scoring (Meta-RL phase)
    days: 14                # number of simulation days for fitness scoring when enabled
    use_real_market_data: false  # set true to use real historical market data instead of random perturbations
    # parallel_realities (1–50): | env LUMINA_PARALLEL_REALITIES | state/parallel_realities_session.json
    # | deze key (laagste prioriteit) |. CLI: --parallel-realities N. Dashboard + CPU-advies in UI.
    parallel_realities: 1
  neuroevolution:
    require_real_simulator_data: true   # true = RL train + neuro only on historical OHLC; no synthetic OHLC fallback
    fetch_days_back: 90                 # MarketDataService.load_historical_ohlc_for_symbol
    fetch_limit: 20000
    max_bars_in_report: 12000           # cap bars passed into RLTradingEnvironment rollouts
    # Fase 2: zelfde stress-presets als DNA; eff. aantal = min(stress_universa_max, parallel_realities). Geen extra rollouts.
    stress_universa_enabled: true
    stress_universa_max: 12
    # Fase 3: PPO multi-rollout; override: LUMINA_NEURO_OHLC_ROLLOUTS of state/bot_stress_choices.json
    use_ohlc_stress_rollouts: false

fine_tuning:
  auto_trigger: true
  min_acceptance: 0.4
  drift_threshold: 0.25

session:
  cooldown_minutes_after_streak: 15
  enforce_calendar: true

portfolio_var:
  confidence: 0.95
  window_days: 30
  max_portfolio_var_usd: 1200
  max_var_usd: 1200
  max_total_open_risk: 3000
  method: historical

audit:
  trade_decision_jsonl: "logs/trade_decision_audit.jsonl"
  fail_closed_real: true

regime:
  enabled: true
  lookback_bars: 120
  trend_adx_threshold: 23
  range_adx_threshold: 18
  high_vol_atr_ratio: 1.6
  news_volume_ratio: 2.2
  low_liquidity_volume_ratio: 0.55
  high_risk_regimes: ["HIGH_VOLATILITY", "NEWS_DRIVEN", "ROLLOVER", "LOW_LIQUIDITY"]
  fast_path_weight_by_regime:
    TRENDING: 0.35
    RANGING: 0.45
    HIGH_VOLATILITY: 0.72
    NEWS_DRIVEN: 0.82
    ROLLOVER: 0.80
    LOW_LIQUIDITY: 0.88
    NEUTRAL: 0.50
  risk_multiplier_by_regime:
    TRENDING: 1.15
    RANGING: 0.85
    HIGH_VOLATILITY: 0.55
    NEWS_DRIVEN: 0.45
    ROLLOVER: 0.50
    LOW_LIQUIDITY: 0.40
    NEUTRAL: 1.00
  emotional_sensitivity_by_regime:
    TRENDING: 0.90
    RANGING: 1.05
    HIGH_VOLATILITY: 1.20
    NEWS_DRIVEN: 1.35
    ROLLOVER: 1.15
    LOW_LIQUIDITY: 1.25
    NEUTRAL: 1.00
  cooldown_minutes_by_regime:
    TRENDING: 20
    RANGING: 25
    HIGH_VOLATILITY: 45
    NEWS_DRIVEN: 60
    ROLLOVER: 50
    LOW_LIQUIDITY: 55
    NEUTRAL: 30
  agent_route_by_regime:
    TRENDING: ["swing", "scalper", "risk"]
    RANGING: ["risk", "scalper", "swing"]
    HIGH_VOLATILITY: ["risk", "scalper"]
    NEWS_DRIVEN: ["risk", "scalper"]
    ROLLOVER: ["risk"]
    LOW_LIQUIDITY: ["risk"]
    NEUTRAL: ["risk", "scalper", "swing"]

monitoring:
  enabled: true
  db_path: "state/metrics.db"          # SQLite sink for dashboard history queries
  flush_interval_s: 30                  # How often background thread flushes to SQLite
  dashboard_url: "${LUMINA_DASHBOARD_URL}"  # Optional link included in Telegram approval proposals

  alert_thresholds:
    latency_ms: 500                     # Alert if any agent layer latency > 500 ms
    daily_loss_usd: -800                # Alert if daily PnL drops below -$800
    websocket_heartbeat_stale_s: 60     # Alert if no WS heartbeat for > 60 s
    model_confidence_drift: 0.25        # Alert if model confidence drifts > 25%
    consecutive_losses: 3               # Alert at or above N consecutive losses

  webhook:
    enabled: false                      # Set true + configure url to receive alerts
    platform: "telegram"                # "discord" | "slack" | "telegram"
    url: "${LUMINA_ALERT_WEBHOOK_URL}"  # Provide via environment variable
    telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
    telegram_chat_id: ""               # Required only when platform = "telegram"
    timeout_s: 5

# ── Headless runtime configuration ────────────────────────────────────────────
# Used by: python -m lumina_launcher --headless --mode=paper --duration=15m --broker=paper
headless:
  # Default simulated session duration (minutes) when --duration flag is omitted.
  default_duration_minutes: 15

  # Default aggressive SIM learning session duration (minutes), used with --aggressive-sim.
  sim_learning_duration_minutes: 60

  # Default overnight SIM mode (4-hour equivalent run) when enabled in runtime/CLI.
  sim_overnight_mode: false

  # Default trading mode for headless runs.
  default_mode: "paper"          # "paper" | "sim" | "real"

  # Default broker backend for headless runs.
  default_broker: "paper"        # "paper" | "live"

  # Where the JSON summary is persisted after each run.
  summary_output_path: "state/last_run_summary.json"

  # Archive each run to a unique file for progression tracking.
  summary_archive_enabled: true
  summary_archive_dir: "state/test_runs"

  # Synthetic ticks generated per minute of simulated session
  # (higher = more trades, slower init; lower = fewer trades, faster).
  ticks_per_minute: 200

  # Seed for deterministic tick generation.
  simulation_seed: 51

  # When evolution.neuroevolution.require_real_simulator_data is true, headless loads ticks via
  # MarketDataService.load_historical_ohlc_extended (Crosstrade). Optional overrides (null = use neuro fetch_*).
  historical_days_back: null
  historical_limit: null

