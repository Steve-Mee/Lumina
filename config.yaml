mode: sim
telegram:
  token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
  waking_hour_start: 8
  waking_hour_end: 22
participant_id: LUMINA_Steve
sim:
  aggressive_evolution: true
  approval_required: false
  daily_loss_cap: null
  kelly_fraction: 1.0
  bible_base_winrate: 0.55
  max_mutation_depth: radical
real:
  aggressive_evolution: false
  approval_required: true
  daily_loss_cap: -150.0
  max_consecutive_losses: 1
  max_open_risk_per_instrument: 75.0
  max_total_open_risk: 150.0
  max_exposure_per_regime: 100.0
  cooldown_after_streak: 60
  session_cooldown_minutes: 60
  enforce_session_guard: true
  kelly_fraction: 0.25
  bible_base_winrate: 0.55
  max_mutation_depth: conservative
hardware_profile: light
reconcile_fills: true
reconciliation_method: websocket
reconciliation_timeout_seconds: 15
use_real_fill_for_pnl: true
broker:
  backend: paper
  crosstrade:
    api_key: ${CROSSTRADE_TOKEN}
    websocket_url: wss://app.crosstrade.io/ws/stream
xai:
  api_key: ${XAI_API_KEY}
  model: grok-4.1-fast
  update_interval_sec: 60
inference:
  primary_provider: ollama
  provider_order:
  - vllm
  - ollama
  - grok_remote
  max_tokens: 1200
  temperature: 0.65
  json_mode: true
  fast_path_threshold: 0.75
  request_timeout_sec: 60
  max_consecutive_failures: 5
vllm:
  host: http://localhost:8000
  model_name: qwen3.5-35b
ollama:
  base_url: http://localhost:11434
  temperature: 0.65
  context_length: 16384
  num_gpu: -1
  num_ctx: 16384
models:
  vision: qwen2.5-vl:7b
  reasoning: qwen3.5:4b
  reflector: qwen2.5:3b
  meta: qwen3.5:9b
  grok_trader_1b: qwen3.5-35b
trading:
  instrument: MES JUN26
  risk_profile: Balanced
  news_avoidance_pre_minutes: 10
  news_avoidance_post_minutes: 5
  news_avoidance_high_impact_pre_minutes: 15
  news_avoidance_high_impact_post_minutes: 10
  news_avoidance_minutes: 3
  news_impact_multipliers:
    high_bullish: 1.8
    high_bearish: 0.4
    medium_neutral: 1.0
  eod_force_close_minutes_before_session_end: 30
  eod_no_new_trades_minutes_before_session_end: 60
  overnight_gap_protection_enabled: true
  kelly_fraction_max: 0.25
  kelly_min_confidence: 0.65
risk_controller:
  daily_loss_cap: -1000.0
  max_consecutive_losses: 3
  max_open_risk_per_instrument: 500.0
  max_total_open_risk: 3000.0
  max_exposure_per_regime: 2000.0
  cooldown_after_streak: 30
  order_book_spread_atr_ratio: 0.1
  order_book_market_impact_alpha: 0.5
  order_book_market_impact_beta: 0.6
  order_book_spread_multipliers:
    open: 2.5
    midday: 1.0
    close: 2.0
  slippage_base_points: 0.125
  slippage_sigma: 0.5
  slippage_volatility_factor: 1.0
  commission_per_side_usd: 1.29
  exchange_fee_per_side_usd: 0.35
  clearing_fee_per_side_usd: 0.1
  nfa_fee_per_side_usd: 0.02
  real_capital_safety_threshold_usd: 1000.0
  real_capital_safety_threshold_ratio: 0.9
  var_es_method: historical
  var_es_window: 200
  var_es_min_samples: 40
  var_es_fail_closed_on_insufficient_data: true
  var_es_insufficient_data_policy: fail_closed_real_only
  enable_var_es_calc: true
  enable_var_es_enforce_sim_real_guard: true
  enable_var_es_enforce_real: true
  var_es_high_risk_limit_multiplier: 0.8
  var_es_normal_risk_limit_multiplier: 1.0
  var_es_reason_codes_enabled: true
  var_95_limit_usd: 1200.0
  var_99_limit_usd: 1800.0
  es_95_limit_usd: 1500.0
  es_99_limit_usd: 2200.0
  enable_mc_drawdown_calc: true
  mc_drawdown_paths: 10000
  mc_drawdown_horizon_days: 252
  mc_drawdown_min_samples: 40
  mc_drawdown_insufficient_data_policy: fail_closed_real_only
  enable_mc_drawdown_enforce_sim_real_guard: true
  enable_mc_drawdown_enforce_real: true
  mc_drawdown_threshold_pct: 12.0
  mc_drawdown_random_seed: 4242
  sim_var_penalty_coeff: 0.04
  sim_es_penalty_coeff: 0.06
  kelly_rolling_window: 50
  kelly_min_window_trades: 10
  kelly_vol_scaling_enabled: true
  kelly_vol_target_annual: 0.15
  kelly_vol_lookback_trades: 20
  market_impact_alpha: 0.5
  market_impact_beta: 0.6
  cost_model_enabled: true
  slippage_base_ticks: 0.5
  enabled: true
security:
  cors_allowed_origins:
  - http://localhost:3000
  - http://127.0.0.1:3000
  - http://localhost:8000
  jwt_secret_key: ${LUMINA_JWT_SECRET_KEY}
  jwt_algorithm: HS256
  jwt_expiration_minutes: 1440
  api_key_header: X-API-Key
  api_keys: {}
  rate_limit_enabled: true
  rate_limit_requests_per_minute: 60
  rate_limit_burst_size: 10
  admin_role_required: true
  audit_log_enabled: true
  audit_log_path: logs/security_audit.jsonl
  dangerous_configs:
    cors_allowed_origins:
    - '*'
    security.debug_mode:
    - true
evolution:
  enabled: true
  approval_required: true
  sandbox_mutations: true
  reality_gap_penalty_coeff: 0.15
  meta_swarm:
    enabled: true
  ohlc_reality_stress_enabled: true
  community_knowledge:
    enabled: true
    max_commit_per_generation: 3
    queue_path: state/community_knowledge_queue.jsonl
    processed_path: state/community_knowledge_processed.txt
    twin_confidence_min: 0.82
    chroma_persist_path: state/chroma_community
    chroma_collection_name: lumina_community_vetted
  dream_engine:
    enabled: true
    dream_count: 4000
    horizon_days: 7
    drawdown_limit_ratio: 0.02
    commit_hints_to_bible: true
    apply_risk_nudges: true
    risk_nudge_modes:
    - sim
    - paper
  shadow_validation:
    min_days: 3
    max_days: 7
    min_trades: 20
    pvalue_threshold: 0.1
    effect_size_threshold: 0.2
  multiweek_fitness:
    enabled: false
    days: 14
    use_real_market_data: false
    parallel_realities: 1
  neuroevolution:
    require_real_simulator_data: true
    fetch_days_back: 90
    fetch_limit: 20000
    max_bars_in_report: 12000
    stress_universa_enabled: true
    stress_universa_max: 12
    use_ohlc_stress_rollouts: false
fine_tuning:
  auto_trigger: true
  min_acceptance: 0.4
  drift_threshold: 0.25
session:
  cooldown_minutes_after_streak: 15
  enforce_calendar: true
portfolio_var:
  confidence: 0.95
  window_days: 30
  max_portfolio_var_usd: 1200
  max_var_usd: 1200
  max_total_open_risk: 3000
  method: historical
audit:
  trade_decision_jsonl: logs/trade_decision_audit.jsonl
  fail_closed_real: true
regime:
  enabled: true
  lookback_bars: 120
  trend_adx_threshold: 23
  range_adx_threshold: 18
  high_vol_atr_ratio: 1.6
  news_volume_ratio: 2.2
  low_liquidity_volume_ratio: 0.55
  high_risk_regimes:
  - HIGH_VOLATILITY
  - NEWS_DRIVEN
  - ROLLOVER
  - LOW_LIQUIDITY
  fast_path_weight_by_regime:
    TRENDING: 0.35
    RANGING: 0.45
    HIGH_VOLATILITY: 0.72
    NEWS_DRIVEN: 0.82
    ROLLOVER: 0.8
    LOW_LIQUIDITY: 0.88
    NEUTRAL: 0.5
  risk_multiplier_by_regime:
    TRENDING: 1.15
    RANGING: 0.85
    HIGH_VOLATILITY: 0.55
    NEWS_DRIVEN: 0.45
    ROLLOVER: 0.5
    LOW_LIQUIDITY: 0.4
    NEUTRAL: 1.0
  emotional_sensitivity_by_regime:
    TRENDING: 0.9
    RANGING: 1.05
    HIGH_VOLATILITY: 1.2
    NEWS_DRIVEN: 1.35
    ROLLOVER: 1.15
    LOW_LIQUIDITY: 1.25
    NEUTRAL: 1.0
  cooldown_minutes_by_regime:
    TRENDING: 20
    RANGING: 25
    HIGH_VOLATILITY: 45
    NEWS_DRIVEN: 60
    ROLLOVER: 50
    LOW_LIQUIDITY: 55
    NEUTRAL: 30
  agent_route_by_regime:
    TRENDING:
    - swing
    - scalper
    - risk
    RANGING:
    - risk
    - scalper
    - swing
    HIGH_VOLATILITY:
    - risk
    - scalper
    NEWS_DRIVEN:
    - risk
    - scalper
    ROLLOVER:
    - risk
    LOW_LIQUIDITY:
    - risk
    NEUTRAL:
    - risk
    - scalper
    - swing
monitoring:
  enabled: true
  db_path: state/metrics.db
  flush_interval_s: 30
  dashboard_url: ${LUMINA_DASHBOARD_URL}
  alert_thresholds:
    latency_ms: 500
    daily_loss_usd: -800
    websocket_heartbeat_stale_s: 60
    model_confidence_drift: 0.25
    consecutive_losses: 3
  webhook:
    enabled: false
    platform: telegram
    url: ${LUMINA_ALERT_WEBHOOK_URL}
    telegram_bot_token: ${TELEGRAM_BOT_TOKEN}
    telegram_chat_id: ''
    timeout_s: 5
headless:
  default_duration_minutes: 15
  sim_learning_duration_minutes: 60
  sim_overnight_mode: false
  default_mode: paper
  default_broker: paper
  summary_output_path: state/last_run_summary.json
  summary_archive_enabled: true
  summary_archive_dir: state/test_runs
  ticks_per_minute: 200
  simulation_seed: 51
  historical_days_back: null
  historical_limit: null
