hardware_profile: "light"          # Verander later naar "sweet" of "beast"
reconcile_fills: true
reconciliation_method: "websocket"
reconciliation_timeout_seconds: 15
use_real_fill_for_pnl: true

broker:
  backend: paper
  crosstrade:
    api_key: "${CROSSTRADE_TOKEN}"
    websocket_url: "wss://app.crosstrade.io/ws/stream"

xai:
  api_key: "${XAI_API_KEY}"
  model: "grok-4.1-fast"
  update_interval_sec: 60

inference:
  primary_provider: "ollama"       # "ollama" | "vllm" | "grok_remote"
  fallback_order: ["vllm", "ollama", "grok_remote"]
  max_tokens: 1200
  temperature: 0.65
  json_mode: true
  fast_path_threshold: 0.75

vllm:
  host: "http://localhost:8000"
  model_name: "qwen3.5-35b"

ollama:
  base_url: "http://localhost:11434"
  temperature: 0.65                # Menselijk gevoel + lichte creativiteit
  context_length: 16384
  num_gpu: -1                      # Volledige GPU
  num_ctx: 16384

models:
  vision: "qwen2.5-vl:7b"
  reasoning: "qwen3.5:4b"
  reflector: "qwen2.5:3b"
  meta: "qwen3.5:9b"               # Zwaardere lokale reasoning voor sweet-profiel
  grok_trader_1b: "qwen3.5-35b"    # High-end provider mapping via vLLM

trading:
  instrument: "MES JUN26"
  risk_profile: "Balanced"
  news_avoidance_minutes: 3
  news_impact_multipliers:
    high_bullish: 1.8
    high_bearish: 0.4
    medium_neutral: 1.0

risk_controller:
  # Hard Risk Controller - Unbreakable Safety Layer (fail-closed)
  # Sensible defaults; adjust based on instrument volatility & account size
  
  # Maximum daily loss before hard kill-switch engages (USD)
  # Negative value: -1000 means stop trading if daily loss reaches -$1000
  daily_loss_cap: -1000.0
  
  # Maximum consecutive losing trades before cooldown period
  # After N consecutive losses, trading pauses for cooldown_after_streak minutes
  max_consecutive_losses: 3
  
  # Maximum risk per individual instrument (USD)
  # Prevents overexposure to single symbol (e.g., MES, NQ, YM)
  max_open_risk_per_instrument: 500.0
  
  # Maximum total exposure per market regime (USD)
  # Protects against correlated losses across all instruments in same regime
  # E.g., if trending_up regime has MES + NQ, cap combined risk
  max_exposure_per_regime: 2000.0
  
  # Cooldown period after loss streak (minutes)
  # After max_consecutive_losses is reached, wait this long before resuming
  cooldown_after_streak: 30
  
  # Enable risk controller (set to false only for testing)
  enabled: true

security:
  # CORS Configuration: Strict allowlist (NO wildcard "*")
  # Specify only trusted domains that need to access the API
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8000"
  
  # JWT Configuration
  jwt_secret_key: "${LUMINA_JWT_SECRET_KEY}"  # Required: provide via environment variable
  jwt_algorithm: "HS256"
  jwt_expiration_minutes: 1440                # 24 hours
  
  # API Key Configuration
  api_key_header: "X-API-Key"
  api_keys:
    # Example admin key (replace with your own generated key)
    # Generate: python -c "import secrets; print(f'sk_{secrets.token_hex(32)}')"
    "sk_example_admin_key_replace_me": 
      name: "Admin Console"
      role: "admin"
      enabled: true
  
  # Rate Limiting (token bucket algorithm)
  rate_limit_enabled: true
  rate_limit_requests_per_minute: 60        # 60 req/min = 1 req/sec average
  rate_limit_burst_size: 10                  # Allow up to 10 concurrent requests
  
  # Admin Role Requirements
  admin_role_required: true                  # Require admin role for destructive endpoints
  
  # Security Audit Logging
  audit_log_enabled: true
  audit_log_path: "logs/security_audit.jsonl"  # Append-only audit trail
  
  # Dangerous Config Validation
  # At startup, fail if these config values are detected (fail-closed mode)
  dangerous_configs:
    "cors_allowed_origins": ["*"]            # CORS wildcard is forbidden
    "security.debug_mode": [true]            # Debug mode must be explicit false

evolution:
  enabled: true
  approval_required: true

regime:
  enabled: true
  lookback_bars: 120
  trend_adx_threshold: 23
  range_adx_threshold: 18
  high_vol_atr_ratio: 1.6
  news_volume_ratio: 2.2
  low_liquidity_volume_ratio: 0.55
  high_risk_regimes: ["HIGH_VOLATILITY", "NEWS_DRIVEN", "ROLLOVER", "LOW_LIQUIDITY"]
  fast_path_weight_by_regime:
    TRENDING: 0.35
    RANGING: 0.45
    HIGH_VOLATILITY: 0.72
    NEWS_DRIVEN: 0.82
    ROLLOVER: 0.80
    LOW_LIQUIDITY: 0.88
    NEUTRAL: 0.50
  risk_multiplier_by_regime:
    TRENDING: 1.15
    RANGING: 0.85
    HIGH_VOLATILITY: 0.55
    NEWS_DRIVEN: 0.45
    ROLLOVER: 0.50
    LOW_LIQUIDITY: 0.40
    NEUTRAL: 1.00
  emotional_sensitivity_by_regime:
    TRENDING: 0.90
    RANGING: 1.05
    HIGH_VOLATILITY: 1.20
    NEWS_DRIVEN: 1.35
    ROLLOVER: 1.15
    LOW_LIQUIDITY: 1.25
    NEUTRAL: 1.00
  cooldown_minutes_by_regime:
    TRENDING: 20
    RANGING: 25
    HIGH_VOLATILITY: 45
    NEWS_DRIVEN: 60
    ROLLOVER: 50
    LOW_LIQUIDITY: 55
    NEUTRAL: 30
  agent_route_by_regime:
    TRENDING: ["swing", "scalper", "risk"]
    RANGING: ["risk", "scalper", "swing"]
    HIGH_VOLATILITY: ["risk", "scalper"]
    NEWS_DRIVEN: ["risk", "scalper"]
    ROLLOVER: ["risk"]
    LOW_LIQUIDITY: ["risk"]
    NEUTRAL: ["risk", "scalper", "swing"]

monitoring:
  enabled: true
  db_path: "state/metrics.db"          # SQLite sink for dashboard history queries
  flush_interval_s: 30                  # How often background thread flushes to SQLite

  alert_thresholds:
    latency_ms: 500                     # Alert if any agent layer latency > 500 ms
    daily_loss_usd: -800                # Alert if daily PnL drops below -$800
    websocket_heartbeat_stale_s: 60     # Alert if no WS heartbeat for > 60 s
    model_confidence_drift: 0.25        # Alert if model confidence drifts > 25%
    consecutive_losses: 3               # Alert at or above N consecutive losses

  webhook:
    enabled: false                      # Set true + configure url to receive alerts
    platform: "discord"                 # "discord" | "slack" | "telegram"
    url: "${LUMINA_ALERT_WEBHOOK_URL}"  # Provide via environment variable
    telegram_chat_id: ""               # Required only when platform = "telegram"
    timeout_s: 5

