hardware_profile: "beast"

inference:
  primary_provider: "vllm"
  fallback_order: ["vllm", "ollama", "grok_remote"]
  max_tokens: 1200
  temperature: 0.10
  json_mode: true
  fast_path_threshold: 0.75

vllm:
  host: "http://vllm:8000"
  model_name: "grok-trader-1b"

ollama:
  base_url: "http://host.docker.internal:11434"
  temperature: 0.65
  context_length: 16384
  num_gpu: -1
  num_ctx: 16384

models:
  vision: "qwen2.5-vl:7b"
  reasoning: "grok-trader-1b"
  reflector: "qwen2.5:3b"
  meta: "qwen2.5:14b"
  grok_trader_1b: "grok-trader-1b"

trading:
  instrument: "MES JUN26"
  risk_profile: "Balanced"