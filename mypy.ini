[mypy]
python_version = 3.11
strict = true
files =
    lumina_core,
    lumina_os,
    lumina_bible,
    lumina_agents,
    scripts,
    tests,
    lumina_launcher.py,
    lumina_v45.1.1.py,
    nightly_infinite_sim.py,
    watchdog.py
exclude =
    (^|/)\.venv/
    |(^|/)__pycache__/
    |(^|/)logs/
    |(^|/)state/
    |(^|/)journal/
    |(^|/)lumina_vector_db/
    |(^|/)docs/
ignore_missing_imports = true
warn_unused_ignores = true
