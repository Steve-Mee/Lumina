[mypy]
python_version = 3.13
strict = false
files =
    lumina_core,
    lumina_bible,
    lumina_agents,
    lumina_launcher.py,
    lumina_runtime.py,
    nightly_infinite_sim.py,
    watchdog.py
exclude =
    (^|/)\.venv/
    |(^|/)__pycache__/
    |(^|/)logs/
    |(^|/)state/
    |(^|/)journal/
    |(^|/)lumina_vector_db/
    |(^|/)docs/
ignore_missing_imports = true
disable_error_code = import-untyped,arg-type,union-attr,attr-defined,assignment,no-redef,unused-ignore,var-annotated,return-value,no-untyped-def,no-untyped-call,type-arg,no-any-return
explicit_package_bases = true
warn_unused_ignores = true
