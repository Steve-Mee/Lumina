[pytest]
testpaths = tests
markers =
    safety_gate: critical SIM/REAL safety gate tests for deployment validation
    integration: tests that require external services or real market data
    real_data: tests that load real historical market bars
    chaos_websocket: Websocket fault injection tests
    chaos_websocket_drop: Websocket connection drop tests
    chaos_websocket_malformed: Malformed frame handling tests
    chaos_websocket_timeout: Ping/pong timeout tests
    chaos_websocket_reconnect: Reconnect logic tests
    chaos_inference: Model inference failure tests
    chaos_inference_timeout: Inference timeout tests
    chaos_inference_http5xx: HTTP 5xx error tests
    chaos_inference_xai_rate_limit: XAI rate limit tests
    chaos_inference_json_parse: JSON parse error tests
    chaos_inference_network_error: Network error tests
    chaos_api: API failure tests
    chaos_api_5xx_storm: API 5xx storm tests
    chaos_api_signature_mismatch: API signature mismatch tests
    chaos_api_timeout: API timeout tests
    chaos_api_rate_limit: API rate limit tests
    chaos_fills: Fill reconciliation chaos tests
    chaos_fills_partial: Partial fill tests
    chaos_fills_duplicate: Duplicate fill tests
    chaos_fills_missing: Missing fill tests
    chaos_fills_out_of_order: Out of order fill tests
    chaos_fills_websocket_gap: Websocket gap recovery tests
    chaos_degradation: Latency degrade mode tests
    chaos_regime: Regime adaptation chaos tests
    chaos_regime_flip: Regime flip and hostile market adaptation tests
    chaos_degrade_high_latency: High latency trigger tests
    chaos_degrade_fast_path_only: Fast-path-only mode tests
    chaos_degrade_recovery: Degrade mode recovery tests
    chaos_risk: Risk controller resilience tests
    chaos_risk_kill_switch: Kill-switch tests
    chaos_risk_daily_loss_cap: Daily loss cap tests
    chaos_risk_exposure_limit: Per-regime exposure limit tests
    chaos_risk_consecutive_loss_cooldown: Consecutive loss cooldown tests
    chaos_combined: Multi-fault scenario tests
    chaos_scenario_black_swan: Black swan event tests
    chaos_scenario_market_halt: Market halt tests
    chaos_scenario_cascading_failures: Cascading failure tests
    chaos_integration: Degrade mode integration tests
    chaos_integration_market_data_sla: Market data SLA tests
    chaos_integration_reasoning_sla: Reasoning SLA tests
    chaos_integration_end_to_end_degradation: End-to-end degradation tests
    chaos_metrics: Metrics collection tests
    chaos_metrics_latency: Latency metrics tests
    chaos_metrics_error_rates: Error rate metrics tests
    chaos_metrics_recovery_time: Recovery time metrics tests
    chaos_ci_integration: CI integration tests
    chaos_ci_smoke: CI smoke tests
    chaos_ci_nightly: Nightly run tests
    chaos: General chaos fault injection marker
filterwarnings =
    ignore:aifc was removed in Python 3.13.*:DeprecationWarning
    ignore:'aifc' is deprecated and slated for removal in Python 3.13:DeprecationWarning
    ignore:'audioop' is deprecated and slated for removal in Python 3.13:DeprecationWarning
    ignore:datetime.datetime.utcnow\(\) is deprecated:DeprecationWarning
