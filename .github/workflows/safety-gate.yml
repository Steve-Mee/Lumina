name: Safety Gate

on:
  push:
    branches:
      - main
      - master
      - develop
      - release/**
  pull_request:
  workflow_dispatch:

jobs:
  safety-gate:
    name: Run safety gate tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-safety-gate.txt
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-safety-gate.txt

      - name: Validate README path drift
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          content = readme.read_text(encoding="utf-8")
          lines = content.splitlines()

          in_section = False
          missing = []
          for raw in lines:
            line = raw.strip()
            if line == "## Mappenstructuur":
              in_section = True
              continue
            if in_section and line.startswith("## "):
              break
            if not in_section:
              continue
            if not line.startswith("- "):
              continue

            token = line[2:].strip()
            if not token.endswith("/"):
              continue
            if "/" in token[:-1]:
              # Skip nested entries; only validate top-level directory bullets.
              continue
            path = Path(token[:-1])
            if not path.exists() or not path.is_dir():
              missing.append(token)

          if missing:
            raise SystemExit(
              "README path drift detected in '## Mappenstructuur': " + ", ".join(missing)
            )

          print("README path drift check passed")
          PY

      - name: Run safety gate
        run: |
          python -m pytest -m safety_gate -q

      - name: Lint pytest marker duplicates
        run: |
          python scripts/validation/check_pytest_marker_duplicates.py

      - name: Run trade mode contract regressions (release blocker)
        run: |
          python -m pytest -q \
            tests/test_order_path_regression.py \
            tests/test_trade_workers.py \
            tests/test_trade_workers_gateway.py

      - name: Run golden path scenario baseline
        run: |
          python scripts/validation/run_golden_paths.py

      - name: Build metrics snapshot (N vs N-1)
        env:
          LUMINA_METRICS_FAIL_ON_BREACH: "true"
          LUMINA_METRICS_THRESHOLDS: deploy/slo_thresholds.json
        run: |
          python scripts/validation/build_metrics_snapshot.py

      - name: Build SLO report gate
        env:
          LUMINA_SLO_FAIL_ON_BREACH: "true"
        run: |
          python scripts/validation/build_slo_report.py

      - name: Audit legacy compat imports
        env:
          LUMINA_FAIL_ON_LEGACY_IMPORTS: "true"
        run: |
          python scripts/validation/audit_legacy_compat_imports.py

      - name: Validate release gate checklist exists
        run: |
          test -f docs/release-gate-checklist.md

      - name: Upload golden path baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-path-baseline
          path: state/golden_path_baseline.json
          if-no-files-found: warn

      - name: Upload metrics snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics-snapshot
          path: |
            state/build_metrics_snapshot.json
            state/build_metrics_snapshot_latest.json
          if-no-files-found: warn

      - name: Upload SLO report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slo-report
          path: state/slo_report.json
          if-no-files-found: warn

      - name: Upload legacy import audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-import-audit
          path: state/legacy_import_audit.json
          if-no-files-found: warn
