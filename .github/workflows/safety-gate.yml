name: Safety Gate

on:
  push:
    branches:
      - main
      - master
      - develop
      - release/**
  pull_request:
  workflow_dispatch:

jobs:
  safety-gate:
    name: Run safety gate tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-safety-gate.txt
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-safety-gate.txt

      - name: Run safety gate
        run: |
          python -m pytest -m safety_gate -q
