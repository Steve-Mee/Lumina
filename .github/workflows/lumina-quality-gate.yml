name: Lumina Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-safety-gate.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-safety-gate.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  mypy:
    name: MyPy strict (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-safety-gate.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-safety-gate.txt

      - name: Run MyPy (strict)
        run: mypy --config-file mypy.ini

  bandit:
    name: Bandit (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-safety-gate.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-safety-gate.txt

      - name: Run Bandit
        run: bandit -r lumina_core lumina_bible lumina_agents scripts lumina_launcher.py lumina_runtime.py nightly_infinite_sim.py watchdog.py -ll

  pytest:
    name: Pytest coverage (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-safety-gate.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-safety-gate.txt

      - name: Run tests with coverage gate
        run: |
          pytest \
            --cov=lumina_core \
            --cov=lumina_bible \
            --cov=lumina_agents \
            --cov=scripts \
            --cov=lumina_launcher \
            --cov=watchdog \
            --cov=nightly_infinite_sim \
            --cov=lumina_runtime \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50