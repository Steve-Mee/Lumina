name: LUMINA Quality Gate

on:
  push:
    branches: [main, master, develop, "release/**"]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  # Prevent tests from writing to the real state/ directory.
  LUMINA_STATE_DIR: /tmp/lumina_ci_state
  LUMINA_LOGS_DIR: /tmp/lumina_ci_logs
  LUMINA_DUAL_THOUGHT_LOG: "false"
  LUMINA_SKIP_STARTUP_DIALOG: "1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint & type-check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Ruff + MyPy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install --quiet -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: MyPy type check
        run: |
          mypy lumina_core/ \
            --ignore-missing-imports \
            --no-error-summary \
            --pretty

      - name: Pyright on lumina_os backend
        run: pyright lumina_os/backend

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Fast unit test gate (< 60 s target)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (not slow)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core + dev dependencies
        run: |
          pip install --quiet -r requirements-core.txt -r requirements-trading.txt -r requirements-dev.txt

      - name: Prepare isolated state directories
        run: |
          mkdir -p $LUMINA_STATE_DIR $LUMINA_LOGS_DIR

      - name: Run fast unit tests
        run: |
          pytest \
            -m "not slow and not nightly and not integration and not e2e" \
            --timeout=30 \
            --tb=short \
            -q \
            --junit-xml=reports/unit-tests.xml \
            -n auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: reports/unit-tests.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Dependency security audit
  # ─────────────────────────────────────────────────────────────────────────
  dependency-security:
    name: Dependency Security (safety + pip-audit + SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install audit tooling
        run: |
          pip install --quiet -r requirements-dev.txt

      - name: Run pip-audit on core + trading
        run: |
          pip-audit --requirement requirements-core.txt
          pip-audit --requirement requirements-trading.txt

      - name: Run Safety audit (scan/check fallback)
        run: |
          python scripts/validation/run_safety_audit.py

      - name: Generate CycloneDX SBOM
        run: |
          pip install --quiet -r requirements-core.txt -r requirements-trading.txt
          cyclonedx-py environment --output-format json --outfile docs/sbom.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: docs/sbom.json
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Safety gate (always runs on main-branch PRs)
  # ─────────────────────────────────────────────────────────────────────────
  safety-gate:
    name: Safety Gate Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core + dev dependencies
        run: |
          pip install --quiet -r requirements-core.txt -r requirements-trading.txt -r requirements-dev.txt

      - name: Prepare isolated state directories
        run: mkdir -p $LUMINA_STATE_DIR $LUMINA_LOGS_DIR

      - name: Run safety-gate tests
        run: |
          pytest \
            -m "safety_gate" \
            --timeout=120 \
            --tb=short \
            -v \
            --junit-xml=reports/safety-gate.xml

      - name: Upload safety gate results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-gate-results
          path: reports/safety-gate.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Coverage report (unit + integration, except slow/nightly)
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core + dev dependencies
        run: |
          pip install --quiet -r requirements-core.txt -r requirements-trading.txt -r requirements-dev.txt

      - name: Prepare isolated state directories
        run: mkdir -p $LUMINA_STATE_DIR $LUMINA_LOGS_DIR

      - name: Run with coverage
        run: |
          pytest \
            -m "not slow and not nightly" \
            --cov=lumina_core \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --timeout=30 \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # 6. Nightly full suite (scheduled)
  # ─────────────────────────────────────────────────────────────────────────
  nightly-full:
    name: Nightly Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install all dependencies
        run: |
          pip install --quiet \
            -r requirements-core.txt \
            -r requirements-trading.txt \
            -r requirements-ml.txt \
            -r requirements-dev.txt

      - name: Prepare isolated state directories
        run: mkdir -p $LUMINA_STATE_DIR $LUMINA_LOGS_DIR

      - name: Run full suite including slow and nightly
        run: |
          pytest \
            --timeout=600 \
            --tb=short \
            -q \
            --junit-xml=reports/nightly.xml

      - name: Upload nightly results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results
          path: reports/nightly.xml
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 7. Quality gate summary
  # ─────────────────────────────────────────────────────────────────────────
  quality-gate-summary:
    name: Quality Gate Pass
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, dependency-security]
    if: always()

    steps:
      - name: Check gate status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-security.result }}" != "success" ]]; then
            echo "Quality gate FAILED: lint=${{ needs.lint.result }}, unit=${{ needs.unit-tests.result }}, depsec=${{ needs.dependency-security.result }}"
            exit 1
          fi
          echo "Quality gate PASSED"
